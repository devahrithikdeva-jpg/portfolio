<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deva AI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}
header{
padding:15px;
text-align:center;
background:#1e293b;
font-size:24px;
font-weight:bold;
}
#chat{
flex:1;
padding:15px;
overflow:auto;
}
.msg{
background:#1e293b;
padding:10px 15px;
border-radius:15px;
margin:10px 0;
width:fit-content;
max-width:80%;
}
.user{
background:#2563eb;
margin-left:auto;
}
input{
width:75%;
padding:12px;
border:none;
border-radius:10px;
}
button{
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}
.footer{
display:flex;
gap:10px;
padding:10px;
background:#1e293b;
}
</style>
</head>
<body>

<header>🤖 Deva AI</header>

<div id="chat">
<div class="msg">Hello! I'm Deva AI. Ask me anything.</div>
</div>

<div class="footer">
<input id="text" placeholder="Type a message...">
<button onclick="send()">Send</button>
</div>

<script>
function send(){
let t=document.getElementById("text");
if(t.value=="") return;
document.getElementById("chat").innerHTML+=
'<div class="msg user">'+t.value+'</div>';
t.value="";
}
</script>

</body>
</html>
