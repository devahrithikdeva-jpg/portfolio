<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deva AI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}
header{
padding:15px;
text-align:center;
background:#1e293b;
font-size:24px;
font-weight:bold;
}
#chat{
flex:1;
padding:15px;
overflow:auto;
}
.msg{
background:#1e293b;
padding:10px 15px;
border-radius:15px;
margin:10px 0;
width:fit-content;
max-width:80%;
}
.user{
background:#2563eb;
margin-left:auto;
}
input{
width:75%;
padding:12px;
border:none;
border-radius:10px;
}
button{
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}
.footer{
display:flex;
gap:10px;
padding:10px;
background:#1e293b;
}
</style>
</head>
<body>

<header>🤖 Deva AI</header>

<div id="chat">
<div class="msg">Hello! I'm Deva AI. Ask me anything.</div>
</div>

<div class="footer">
<input id="text" placeholder="Type a message...">
<button onclick="send()">Send</button>
</div>

 <script>
const replies = [
"Hello! 😊",
"It's nice to see you here.",
"Tell me something about yourself.",
"You have a beautiful smile.",
"I'm always here to chat with you.",
"Every conversation with you feels special. ✨"
];

function send(){
const input=document.getElementById("text");
if(input.value.trim()=="") return;

const chat=document.getElementById("chat");

chat.innerHTML+=`<div class="msg user">${input.value}</div>`;

let msg=input.value;
input.value="";

setTimeout(()=>{
let reply=replies[Math.floor(Math.random()*replies.length)];
chat.innerHTML+=`<div class="msg">${reply}</div>`;
chat.scrollTop=chat.scrollHeight;
},800);

chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
